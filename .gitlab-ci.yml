stages:
  - lint
  - build
  - deploy

variables:
  DOCKER_DRIVER: overlay2
  DOCKER_TLS_CERTDIR: ""
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest

# ─── Lint & TypeCheck ───────────────────────────────────────────────────
lint:
  stage: lint
  tags:
    - trioz-production
  image: node:20-alpine
  cache:
    key: ${CI_COMMIT_REF_SLUG}-npm
    paths:
      - node_modules/
  before_script:
    - npm ci
    - npx prisma generate
  script:
    - npm run lint
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── Build Docker Image ─────────────────────────────────────────────────
build:
  stage: build
  tags:
    - trioz-production
  image: docker:24-dind
  services:
    - docker:24-dind
  before_script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - docker build -t $IMAGE_TAG -t $IMAGE_LATEST .
    - docker push $IMAGE_TAG
    - docker push $IMAGE_LATEST
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
    - if: $CI_COMMIT_TAG

# ─── Deploy to Production ────────────────────────────────────────────────
deploy:
  stage: deploy
  tags:
    - trioz-production
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    COMPOSE_PROJECT_NAME: trioz
  before_script:
    - apk add --no-cache docker-compose || true
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    # Pull latest image
    - docker pull $IMAGE_TAG || true
    # Create .env from CI variables
    - |
      cat > .env <<EOF
      CI_REGISTRY_IMAGE=$CI_REGISTRY_IMAGE
      CI_COMMIT_SHORT_SHA=$CI_COMMIT_SHORT_SHA
      POSTGRES_USER=$POSTGRES_USER
      POSTGRES_PASSWORD=$POSTGRES_PASSWORD
      POSTGRES_DB=$POSTGRES_DB
      NEXTAUTH_URL=$NEXTAUTH_URL
      NEXTAUTH_SECRET=$NEXTAUTH_SECRET
      ALLOWED_ORIGINS=$ALLOWED_ORIGINS
      ENCRYPTION_SECRET=$ENCRYPTION_SECRET
      TURN_URL=$TURN_URL
      TURN_USERNAME=$TURN_USERNAME
      TURN_CREDENTIAL=$TURN_CREDENTIAL
      SMTP_HOST=$SMTP_HOST
      SMTP_PORT=$SMTP_PORT
      SMTP_USER=$SMTP_USER
      SMTP_PASSWORD=$SMTP_PASSWORD
      SMTP_FROM=$SMTP_FROM
      APP_PORT=${APP_PORT:-3000}
      EOF
    # Stop old containers, start new ones
    - docker-compose down --remove-orphans || true
    - docker-compose up -d postgres redis coturn
    # Wait for DB to be ready
    - sleep 10
    # Run migrations
    - docker-compose run --rm app npx prisma db push --skip-generate
    # Start app
    - docker-compose up -d app
    # Cleanup old images
    - docker image prune -f || true
  environment:
    name: production
    url: $NEXTAUTH_URL
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
    - if: $CI_COMMIT_TAG
      when: manual
  when: manual

# ─── Rollback (manual) ───────────────────────────────────────────────────
rollback:
  stage: deploy
  tags:
    - trioz-production
  image: docker:24-dind
  services:
    - docker:24-dind
  variables:
    COMPOSE_PROJECT_NAME: trioz
  before_script:
    - apk add --no-cache docker-compose || true
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
  script:
    - echo "Rolling back to previous image..."
    - docker-compose pull app
    - docker-compose up -d app
  environment:
    name: production
    action: stop
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      when: manual
  when: manual
