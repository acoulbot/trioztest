name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: trioz_test
          POSTGRES_PASSWORD: trioz_test
          POSTGRES_DB: trioz_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U trioz_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://trioz_test:trioz_test@localhost:5432/trioz_test
      NEXTAUTH_SECRET: ci-test-secret-key-do-not-use-in-production
      NEXTAUTH_URL: http://localhost:3000

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Run migrations
        run: npx prisma db push --skip-generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
